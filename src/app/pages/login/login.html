<div class="auth-container">

  <h1>

    Task Manager

  </h1>

  <input
    placeholder="Email"
    [(ngModel)]="email"
  />

  <input
    type="password"
    placeholder="Password"
    [(ngModel)]="password"
  />

  <button (click)="login()">

    Login

  </button>

  <a routerLink="/register">

    Register

  </a>

</div>
